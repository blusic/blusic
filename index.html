<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blusic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="loading-overlay" aria-hidden="true">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading</div>
    </div>
    <section class="library-panel" aria-label="Library">
      <div class="songs-search">
        <input
          class="songs-search-input"
          type="search"
          placeholder="Search artists or songs"
          aria-label="Search"
        />
      </div>
      <section class="songs-list" aria-label="Songs"></section>
      <div class="search-overlay" aria-hidden="true">
        <div class="search-spinner" aria-hidden="true"></div>
      </div>
    </section>
    <main class="player-shell">
      <section class="progress-panel is-collapsed" aria-expanded="false">
        <button class="player-toggle" type="button" aria-label="Show player">
          <span class="player-toggle-arrow" aria-hidden="true"></span>
        </button>
        <div class="track-meta">
          <div class="time-stack">
            <div class="volume-row">
              <button class="volume-toggle" type="button" aria-label="Toggle volume">
                <img class="volume-icon" src="./assets/volume_on.png" alt="" />
              </button>
              <div class="volume-slider">
                <div
                  class="volume-bar"
                  role="slider"
                  aria-label="Volume"
                  aria-valuemin="0"
                  aria-valuemax="100"
                  aria-valuenow="60"
                >
                  <div class="volume-fill"></div>
                  <div class="volume-knob" aria-hidden="true"></div>
                </div>
                <label class="volume-label">
                  <input class="volume-input" type="number" value="60" min="0" max="100" />
                  <span class="volume-unit">%</span>
                </label>
              </div>
            </div>
            <div class="time-group">
              <span class="time">00:00</span>
              <span class="divider">/</span>
              <span class="duration">00:00</span>
            </div>
          </div>
          <div class="track-info">
            <div class="track-text">
              <div class="track-title"></div>
              <div class="track-artist"></div>
            </div>
            <img class="track-thumb" alt="" />
          </div>
        </div>
        <button class="play-toggle" type="button" aria-label="Play">
          <img src="./assets/play.png" alt="" />
        </button>
        <div
          class="progress-bar"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="18"
        >
          <div class="progress-fill" style="width: 18%"></div>
          <div class="progress-knob" aria-hidden="true"></div>
        </div>
      </section>
    </main>
    <script src="./renderer.js" defer></script>
  </body>
</html>
